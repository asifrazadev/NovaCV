# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: "en-US"

reviews:
  profile: "assertive" # options: chill, assertive, comprehensive
  request_changes_workflow: false
  high_level_summary: true
  poetic_summaries: false
  auto_review:
    enabled: true
    drafts: false

chat:
  enabled: true

# List of paths to exclude from review
# ignore:
#   - "**/node_modules/**"
#   - "**/dist/**"
#   - "**/.next/**"
